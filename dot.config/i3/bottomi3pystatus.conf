import subprocess
import requests
import yaml

from i3pystatus import Status, IntervalModule
from i3pystatus.iinet import IINet
from i3pystatus.updates import pacman, cower
from i3pystatus.mail import imap

with open('/home/max/.secrets/i3pystatus.yml') as f:
    secrets = yaml.load(f)
    
wifi_card = 'wlp4s0'

status = Status(logfile='/home/max/.i3pystatus.log')


__author__ = 'chestm007'

status.register(
    "updates",
    format="Updates: {count}",
    format_no_updates="",
    on_leftclick="termite --geometry=1200x600 --title=updates -e "
                 "'pacaur --needed --noconfirm --noedit -Syu'",
    backends=[pacman.Pacman(), cower.Cower()]
)

status.register(
    "clock",
    format="%d/%m  %H:%M:%S",
    color='#C678DD',
    interval=0.5,
    on_leftclick="/usr/bin/gsimplecal"
)

status.register(
    'amdgpu',
    card=0,
    interval=0.5,
    format='Gpu0: {temp:.0f} {sclk}'
)

status.register(
    'amdgpu',
    card=1,
    interval=0.5,
    format='Gpu1: {temp:.0f} {sclk}'
)

status.register(
    "pulseaudio",
    color_unmuted='#98C379',
    color_muted='#E06C75',
    format_muted='[muted]',
    format="VOL {volume}%"
)

status.register(
    "network",
    interface='enp5s0',
    color_up="#8AE234",
    color_down="#EF2929",
    format_up="{v4cidr} {interface} {bytes_recv:>9} {rx_tot}",
    auto_units=True,
    ignore_interfaces=['lo', 'docker0'],
    detached_down=False,
    interval=1,
    round_size=2,
)

status.register(
    'cpu_usage_graph',
    direction='right-to-left',
    on_leftclick="terminator --title=htop -e 'htop'",
)

